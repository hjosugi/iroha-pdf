name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 22.13.0
  CARGO_TERM_COLOR: always

jobs:
  quality:
    name: Quality and Expo validation
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install locked dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Build desktop web assets
        run: npm run build:desktop
      - name: Validate EAS profiles
        run: npm run validate:eas
      - name: Resolve public Expo config
        run: npx expo config --type public --json > expo-config.json
        working-directory: apps/mobile
      - name: Validate Android prebuild
        run: npx expo prebuild --platform android --no-install --clean
        working-directory: apps/mobile
        env:
          EXPO_NO_DOCTOR: "1"
      - name: Retain web build and resolved Expo config
        uses: actions/upload-artifact@v4
        with:
          name: quality-artifacts
          path: |
            apps/desktop/dist/
            apps/mobile/expo-config.json
          if-no-files-found: error
          retention-days: 14

  tauri:
    name: Tauri (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: >-
          sudo apt-get update && sudo apt-get install -y --no-install-recommends
          libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Install locked dependencies
        run: npm ci
      - name: Build desktop web assets
        run: npm run build --workspace @iroha-pdf/desktop
      - name: Build Tauri native executable without packaging
        run: >-
          cargo build --release --locked
          --manifest-path apps/desktop/src-tauri/Cargo.toml
      - name: Retain native executable
        uses: actions/upload-artifact@v4
        with:
          name: tauri-${{ runner.os }}
          path: |
            apps/desktop/src-tauri/target/release/iroha-pdf
            apps/desktop/src-tauri/target/release/iroha-pdf.exe
          if-no-files-found: error
          retention-days: 14

  supply-chain:
    name: Supply-chain policy
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target
      - name: Install locked dependencies
        run: npm ci
      - name: Audit npm advisories
        run: npm audit --audit-level=high
      - name: Generate reproducible npm CycloneDX SBOM
        run: npm run sbom:npm
      - name: Enforce npm license allowlist and detect copyleft
        run: npm run audit:licenses:npm
      - name: Install pinned Rust audit tools
        run: |
          cargo install --locked cargo-audit --version 0.22.2
          cargo install --locked cargo-cyclonedx --version 0.5.9
          cargo install --locked cargo-deny --version 0.20.2
      - name: Audit Cargo advisories
        run: cargo audit --file apps/desktop/src-tauri/Cargo.lock
      - name: Enforce Cargo license allowlist
        run: >-
          cargo deny --manifest-path apps/desktop/src-tauri/Cargo.toml
          --config release/supply-chain/deny.toml check licenses
      - name: Generate Cargo CycloneDX SBOM
        run: |
          cargo cyclonedx --manifest-path apps/desktop/src-tauri/Cargo.toml --format json --spec-version 1.5
          node release/supply-chain/normalize-cyclonedx.mjs apps/desktop/src-tauri/iroha-pdf.cdx.json artifacts/cargo.cdx.json
      - name: Retain SBOM and license evidence
        uses: actions/upload-artifact@v4
        with:
          name: supply-chain-reports
          path: artifacts/
          if-no-files-found: error
          retention-days: 90
  e2e:
    name: e2e (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22.13.0
          cache: npm
      - run: npm ci

      # poppler and Ghostscript let the rendering suite confirm annotations are
      # visible outside pdfium. Where they are absent those tests skip themselves.
      - name: Install PDF rasterisers (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y poppler-utils ghostscript imagemagick
      - name: Install PDF rasterisers (macOS)
        if: runner.os == 'macOS'
        run: brew install poppler ghostscript imagemagick

      - run: npx playwright install --with-deps chromium
        working-directory: apps/desktop
      - run: npm run build:desktop
      - run: npm run e2e
        env:
          # Shared runners are slower than a developer machine; only time budgets scale.
          PERF_BUDGET_SCALE: '4'

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-${{ matrix.os }}
          path: |
            apps/desktop/playwright-report/
            apps/desktop/test-results/
          retention-days: 14

  # Not on pull_request: a cold build measured 42m 51s locally, most of it fetching the
  # 2 GB NDK and compiling native code. Gating every PR on that is not worth it, so this
  # runs on main and on demand. Caches should bring warm runs down substantially.
  android:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22.13.0
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          # Matches the JDK 21 the local build was verified against.
          java-version: '21'
      - uses: android-actions/setup-android@v3

      - run: npm ci
      - name: Generate the native project
        run: npx expo prebuild --no-install --platform android
        working-directory: apps/mobile

      # Gradle pulls the NDK and cmake itself; caching them is what makes this bearable.
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/Android/Sdk/ndk
            ~/Android/Sdk/cmake
          key: android-${{ runner.os }}-${{ hashFiles('apps/mobile/package.json') }}
          restore-keys: android-${{ runner.os }}-

      - name: Build the debug APK
        run: ./gradlew assembleDebug --no-daemon
        working-directory: apps/mobile/android

      - uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: apps/mobile/android/app/build/outputs/apk/debug/*.apk
          retention-days: 14
